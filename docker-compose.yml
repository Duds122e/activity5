name: docker-config

services:
  # Web Application Service
  platform_docker-app:
    container_name: GUTIB-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - DB_HOST=platform_docker-db
      - DB_NAME=platform_db
      - DB_USER=platform_user
      - DB_PASSWORD=platform_password
    volumes:
      - ./templates:/var/www/html/templates
      - ./src:/var/www/html/src
    depends_on:
      - platform_docker-db
    networks:
      - platform-network
    restart: unless-stopped

  # Database Service
  platform_docker-db:
    container_name: GUTIB-db
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=platform_db
      - MYSQL_USER=platform_user
      - MYSQL_PASSWORD=platform_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - platform-network
    restart: unless-stopped

  # phpMyAdmin Service
  platform_docker-phpmyadmin:
    container_name: GUTIB-phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    environment:
      - PMA_HOST=platform_docker-db
      - PMA_USER=platform_user
      - PMA_PASSWORD=platform_password
      - PMA_PORT=3306
    ports:
      - "8081:80"
    depends_on:
      - platform_docker-db
    networks:
      - platform-network
    restart: unless-stopped

# Network configuration
networks:
  platform-network:
    driver: bridge

# Volume for database persistence
volumes:
  db_data:
    driver: local
